name: Workspace compliance checks

on:
  pull_request:
    paths:
      - '**.md'
      - '**.tf'
      - '**.tfvars.example'
      - 'CLAUDE.md'
      - '.github/workflows/compliance-checks.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout juro-platform scripts
        uses: actions/checkout@v4
        with:
          repository: jecertis/juro-platform
          token: ${{ secrets.JURO_PLATFORM_READ_TOKEN }}
          path: juro-platform-scripts
          sparse-checkout: |
            scripts/check-banned-claims.sh
            contracts/banned-claims.md
            contracts/agent-preamble.md
          sparse-checkout-cone-mode: false

      - name: Make scripts executable
        run: chmod +x juro-platform-scripts/scripts/check-banned-claims.sh juro-platform-scripts/scripts/check-agent-preamble.sh

      - name: Collect markdown files for banned-claims check
        run: |
          set -e
          files=()
          [[ -f README.md ]] && files+=("README.md")
          [[ -f CLAUDE.md ]] && files+=("CLAUDE.md")
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find . -name '*.md' -not -path './.git/*' -not -path './juro-platform-scripts/*' -print0 2>/dev/null || true)
          printf '%s\n' "${files[@]}" > files.txt

      - name: Run banned-claims check
        run: |
          juro-platform-scripts/scripts/check-banned-claims.sh \
            --banned-claims juro-platform-scripts/contracts/banned-claims.md \
            --files files.txt

      - name: Run agent-preamble check
        run: |
          juro-platform-scripts/scripts/check-agent-preamble.sh \
            --canonical juro-platform-scripts/contracts/agent-preamble.md \
            CLAUDE.md
