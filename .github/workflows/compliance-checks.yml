name: Workspace compliance checks

on:
  pull_request:
    paths:
      - '**.md'
      - '**.tf'
      - '**.tfvars.example'
      - 'CLAUDE.md'
      - '.github/workflows/compliance-checks.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        # Scripts are vendored from juro-platform/scripts/. juro-platform
        # is private, so cross-repo checkout requires a PAT secret.
        # Vendoring eliminates that dependency — re-vendor when the
        # canonical list changes in juro-platform.
        run: chmod +x .github/scripts/check-banned-claims.sh .github/scripts/check-agent-preamble.sh

      - name: Collect markdown files for banned-claims check
        run: |
          set -e
          files=()
          # CLAUDE.md is an agent instruction file that quotes banned phrases
          # in their prohibited context — exclude it from the marketing-surface check.
          [[ -f README.md ]] && files+=("README.md")
          while IFS= read -r -d '' f; do
            [[ "$f" == "./CLAUDE.md" ]] && continue
            [[ "$f" == "./.github/contracts/agent-preamble.md" ]] && continue
            files+=("$f")
          done < <(find . -name '*.md' -not -path './.git/*' -print0 2>/dev/null || true)
          printf '%s\n' "${files[@]}" > files.txt

      - name: Run banned-claims check
        run: |
          if [[ -s files.txt ]]; then
            xargs -a files.txt .github/scripts/check-banned-claims.sh
          else
            echo "No markdown files found — skipping banned-claims check"
          fi

      - name: Run agent-preamble check
        run: .github/scripts/check-agent-preamble.sh CLAUDE.md
